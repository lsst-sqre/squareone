component:
  # Typography for body text
  text:
    color:
      themed:
        light:
          value: '{color.gray.800.value}'
          comment: 'Body text color'
        dark:
          value: '{color.gray.100.value}'
          comment: 'Body text color in dark theme'
    secondary:
      color:
        themed:
          light:
            value: '{color.gray.600.value}'
            comment: 'Muted/secondary text color'
          dark:
            value: '{color.gray.300.value}'
            comment: 'Muted/secondary text color in dark theme'
    reverse:
      color:
        value: '{color.gray.100.value}'
        comment: 'Body text color in reversed (light on dark) contexts.'
    link:
      color:
        themed:
          light:
            value: '#146685' # darker than blue-500
          dark:
            value: '{color.blue.300.value}'
      hover:
        color:
          themed:
            light:
              value: '{color.blue.600.value}' # blue-500 (4.44:1) fails; blue-600 clears 4.5:1
            dark:
              # Hover must go *lighter* than the resting dark link (blue-300,
              # 9.19:1 on the dark page) — the old value re-used the light
              # resting link (#146685), only 2.52:1 on dark and the wrong
              # direction. blue-200 is 11.80:1 on the dark page.
              value: '{color.blue.200.value}'
      reverse:
        color:
          value: '{component.text.link.color.themed.dark.value}'
          comment: 'Link color in reversed (light on dark) contexts.'
    headline:
      color:
        themed:
          light:
            value: '{component.text.color.themed.light.value}'
            comment: 'Headlines render in body text color (gray-800) so h1/h2 are black, not brand teal.'
          dark:
            value: '{component.text.color.themed.dark.value}'
            comment: 'Headlines render in dark-theme body text color, not brand teal.'
