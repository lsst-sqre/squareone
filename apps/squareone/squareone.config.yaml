siteName: 'Squareone Development Site'
baseUrl: 'http://localhost:3000'
environmentName: 'development'
siteDescription: |
  The site description.
docsBaseUrl: 'https://rsp.lsst.io'
repertoireUrl: 'http://localhost:3000/repertoire'
timesSquareUrl: 'http://localhost:3000/times-square/api'
coManageRegistryUrl: 'https://id.lsst.cloud'
enableAppsMenu: true
appLinks:
  - label: 'Times Square'
    href: '/times-square/'
    internal: true
  - label: 'Argo CD'
    href: '/argo-cd/'
    internal: false
showPreview: true
previewLink: 'https://rsp.lsst.io/roadmap.html'
# Enabled in the dev config so the header unread badge and notifications UI are
# exercisable against the local dev mocks (see src/app/api/dev/semaphore). The
# production default remains false (schema default; Phalanx configs opt in).
enableUserNotifications: true
userNotificationsPollIntervalSeconds: 300
# New configuration for filesystem-based MDX content
mdxDir: 'src/content/pages'
sentryTracesSampleRate: 0
sentryReplaysSessionSampleRate: 0
sentryReplaysOnErrorSampleRate: 1.0
sentryDebug: false
sentryOrg: 'rubin-observatory'
sentryProject: 'squareone'
