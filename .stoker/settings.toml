[profile]
source = "github.com/lsst-sqre/rubin-stoker//profile@main"

[sandbox]
repo = "lsst-sqre/squareone"

[sandbox.env]
TURBO_API = "https://roundtable.lsst.cloud/turborepo-cache"
TURBO_TEAM = "lsst-sqre"
TURBO_TOKEN = "$secret:turbo_token"

# Additive entries for the sandbox egress firewall. The firewall rejects
# everything not allowlisted. These take effect once the sandbox is up (extras
# propagate after postCreate), which is correct for hosts reached only during
# interactive work rather than during postCreate.
#
#   - roundtable.lsst.cloud is the Turborepo remote cache host (the host of
#     TURBO_API in [sandbox.env]); without it `pnpm build`/`test`/`lint` log
#     "Remote caching unavailable (Could not connect to ...)" and fall back to
#     local-only caching. postCreate runs only `pnpm install` (not a turbo
#     task), so the cache is reached during interactive work, not boot.
#   - cdn.playwright.dev (default host) and playwright.download.prss.microsoft.com
#     (Microsoft mirror) serve Playwright's browser binaries (Chromium, used by
#     the Storybook browser tests); without them `pnpm exec playwright install
#     chromium` is blocked. See scripts/install-playwright.js for the on-demand
#     install.
#   - data.lsst.cloud is the production RSP; it hosts the vendored RSP OpenAPI
#     specs synced by the repertoire (`/repertoire/openapi.json`), gafaelfawr
#     (`/auth/openapi.json`), and semaphore (`/semaphore/openapi.json`) clients
#     (see each package's `fetch-openapi` script). Reached during interactive
#     spec re-syncs, not boot.
#   - data-dev.lsst.cloud is the dev RSP equivalent of data.lsst.cloud, for
#     syncing the same specs against the development deployment.
#   - roundtable-dev.lsst.cloud is the dev roundtable deployment (the prod
#     roundtable.lsst.cloud above is already allowlisted as the Turborepo cache
#     host, so it is not duplicated here).
#   - times-square.lsst.io hosts the times-square-client OpenAPI spec
#     (`/_static/openapi.json`), which is served there rather than on
#     data.lsst.cloud.
[sandbox.firewall_extra_domains]
domains = [
  "roundtable.lsst.cloud",
  "cdn.playwright.dev",
  "playwright.download.prss.microsoft.com",
  "data.lsst.cloud",
  "data-dev.lsst.cloud",
  "roundtable-dev.lsst.cloud",
  "times-square.lsst.io",
]

[secrets_required.turbo_token]
description = "Gafaelfawr token with write:turborepo scope"
example = "op://Employee/Turborepo Remote Cache/token"
optional = false
